<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analysis Result — SkillGapAI</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <style>
    .result-page-body {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-2xl) var(--space-lg);
    }

    /* ── Hero score card ─────────────────────────────────── */
    .score-hero {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      margin-bottom: var(--space-xl);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    .score-hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(99,102,241,0.08), transparent 70%);
      pointer-events: none;
    }

    .score-hero-layout {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--space-2xl);
      align-items: center;
    }

    /* Circular gauge */
    .gauge-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      flex-shrink: 0;
    }

    .gauge-ring {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: conic-gradient(rgba(255,255,255,0.06) 360deg, transparent 0);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.05s;
    }

    .gauge-ring::before {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: var(--surface);
    }

    .gauge-inner {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .gauge-score {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .gauge-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* Score details */
    .score-details { flex: 1; }

    .score-role-name {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-xs);
    }

    .score-role-domain {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: var(--space-lg);
    }

    .level-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: var(--radius-full);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: var(--space-lg);
    }

    .level-chip-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .summary-pills {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-xl);
    }

    .summary-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--font-display);
    }

    .pill-missing  { background:rgba(244,63,94,0.1);  color:#fb7185;  border:1px solid rgba(244,63,94,0.2); }
    .pill-weak     { background:rgba(245,158,11,0.1); color:#fbbf24;  border:1px solid rgba(245,158,11,0.2); }
    .pill-adequate { background:rgba(16,185,129,0.1); color:#34d399;  border:1px solid rgba(16,185,129,0.2); }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      margin-top: var(--space-lg);
    }

    /* ── Gap sections ────────────────────────────────────── */
    .gaps-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
    }

    .gap-section {
      animation: fadeInUp 0.4s ease both;
    }

    .gap-section-header {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .gap-section-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .gap-section-count {
      background: var(--surface-3);
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 700;
      font-family: var(--font-display);
      padding: 2px 9px;
      border-radius: var(--radius-full);
    }

    .gap-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-md);
    }

    .gap-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      transition: all 0.25s;
      animation: fadeInUp 0.4s ease both;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gap-card:hover { transform: translateY(-2px); }

    .gap-missing  { border: 1px solid rgba(244,63,94,0.22); }
    .gap-missing:hover { box-shadow: 0 6px 20px rgba(244,63,94,0.1); }

    .gap-weak     { border: 1px solid rgba(245,158,11,0.22); }
    .gap-weak:hover { box-shadow: 0 6px 20px rgba(245,158,11,0.1); }

    .gap-adequate { border: 1px solid rgba(16,185,129,0.22); }
    .gap-adequate:hover { box-shadow: 0 6px 20px rgba(16,185,129,0.1); }

    .gap-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-sm);
    }

    .gap-card-name {
      font-size: 0.88rem;
      font-weight: 600;
      font-family: var(--font-display);
      color: var(--text);
      line-height: 1.3;
    }

    .gap-info-pill {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-family: var(--font-display);
      white-space: nowrap;
    }

    .gap-pill-missing  { background:rgba(244,63,94,0.1);  color:#fb7185; }
    .gap-pill-weak     { background:rgba(245,158,11,0.1); color:#fbbf24; }
    .gap-pill-adequate { background:rgba(16,185,129,0.1); color:#34d399; }

    .gap-card-levels {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .level-bar-mini {
      flex: 1;
      height: 4px;
      background: var(--surface-3);
      border-radius: 2px;
      overflow: hidden;
    }

    .level-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    .gap-level-text {
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
      font-family: var(--font-display);
      font-weight: 600;
    }

    .gap-resource-link {
      font-size: 0.78rem;
      color: var(--primary-light);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
      margin-top: 2px;
    }
    .gap-resource-link:hover { color: var(--accent-light); }

    /* Save / export bar */
    .sticky-action-bar {
      position: sticky;
      bottom: var(--space-lg);
      z-index: 20;
      display: flex;
      justify-content: center;
      pointer-events: none;
      margin-top: var(--space-2xl);
    }

    .action-bar-inner {
      background: rgba(17,24,39,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-full);
      padding: 12px 20px;
      display: flex;
      gap: var(--space-md);
      align-items: center;
      pointer-events: all;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .action-bar-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding-right: var(--space-md);
      border-right: 1px solid var(--border-light);
    }

    @media (max-width: 640px) {
      .score-hero-layout { grid-template-columns: 1fr; }
      .gauge-wrap { margin: 0 auto; }
      .gap-cards-grid { grid-template-columns: 1fr; }
      .action-bar-inner { flex-wrap: wrap; justify-content: center; }
      .action-bar-label { display: none; }
    }
  </style>
</head>
<body>
<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">⚡</div>
      <div class="sidebar-logo-text">
        SkillGap<span style="color:var(--accent)">AI</span>
        <div class="sidebar-logo-sub">Career Intelligence</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Menu</div>
      <a href="dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span> Dashboard</a>
      <a href="analyzer.html"  class="sidebar-link"><span class="sidebar-link-icon">🎯</span> Skill Analyzer</a>
      <a href="history.html"   class="sidebar-link"><span class="sidebar-link-icon">📁</span> History</a>
      <a href="roadmap.html"   class="sidebar-link active"><span class="sidebar-link-icon">🗺️</span> Roadmap</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name"  id="sidebarName">—</div>
          <div class="sidebar-user-email" id="sidebarEmail"></div>
        </div>
      </div>
      <button class="sidebar-logout" id="logoutBtn"><span>🚪</span> Sign Out</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:var(--space-md)">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <span class="topbar-title">📊 Analysis Result</span>
      </div>
      <div class="topbar-right">
        <a href="analyzer.html" class="btn btn-outline btn-sm">+ New Analysis</a>
      </div>
    </div>

    <div class="result-page-body">

      <!-- Score hero -->
      <div class="score-hero" id="scoreHero">
        <div class="score-hero-layout">
          <div class="gauge-wrap">
            <div class="gauge-ring" id="gaugeRing">
              <div class="gauge-inner">
                <span class="gauge-score" id="gaugeScore" style="color:var(--text)">0</span>
                <span class="gauge-label">/ 100</span>
              </div>
            </div>
          </div>

          <div class="score-details">
            <div class="score-role-name"  id="resultRoleName">—</div>
            <div class="score-role-domain" id="resultDomain">—</div>

            <div class="level-chip" id="levelChip">
              <div class="level-chip-dot" id="levelDot"></div>
              <span id="levelText">—</span>
            </div>

            <div class="summary-pills" id="summaryPills"></div>

            <div class="action-row">
              <button class="btn btn-outline btn-sm" id="saveBtn">
                <span>💾</span> Save Result
              </button>
              <button class="btn btn-outline btn-sm" id="exportBtn" disabled title="Save first to export PDF">
                <span>📄</span> Export PDF
              </button>
              <a href="roadmap.html" class="btn btn-accent btn-sm" id="roadmapBtn">
                <span>🗺️</span> View Roadmap
              </a>
            </div>

            <div id="saveAlert" class="alert mt-md hidden"></div>
          </div>
        </div>
      </div>

      <!-- Gaps -->
      <div class="gaps-container" id="gapsContainer"></div>

    </div>

    <!-- Sticky action bar -->
    <div class="sticky-action-bar">
      <div class="action-bar-inner">
        <span class="action-bar-label">Quick actions</span>
        <button class="btn btn-primary btn-sm" id="saveBtnBar">💾 Save</button>
        <button class="btn btn-outline btn-sm" id="exportBtnBar" disabled>📄 PDF</button>
        <a href="roadmap.html" class="btn btn-accent btn-sm">🗺️ Roadmap</a>
        <a href="analyzer.html" class="btn btn-ghost btn-sm">+ New</a>
      </div>
    </div>

  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/analyzer.js"></script>
<script>
  Auth.requireAuth();

  document.getElementById('sidebarName').textContent  = Auth.getUserName() || 'User';
  document.getElementById('sidebarEmail').textContent = Auth.getUserEmail() || '';
  const initials = (Auth.getUserName()||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('logoutBtn').addEventListener('click', Auth.logout);

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('visible');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  });

  // ── Load result from sessionStorage ─────────────────────────
  const result = Analyzer.loadAnalysisResult();
  if (!result) {
    window.location.href = 'analyzer.html';
    throw new Error('No result');
  }

  const { score, level, gaps, strong_skills, role, _meta } = result;

  // Role info
  document.getElementById('resultRoleName').textContent = role?.role_name || 'Analysis';
  document.getElementById('resultDomain').textContent   = role?.domain    || '';

  // Level chip color
  const levelConfig = {
    'Beginner':     { color:'#f43f5e', bg:'rgba(244,63,94,0.1)',  border:'rgba(244,63,94,0.2)' },
    'Intermediate': { color:'#f59e0b', bg:'rgba(245,158,11,0.1)', border:'rgba(245,158,11,0.2)' },
    'Advanced':     { color:'#10b981', bg:'rgba(16,185,129,0.1)', border:'rgba(16,185,129,0.2)' },
    'Expert':       { color:'#6366f1', bg:'rgba(99,102,241,0.1)', border:'rgba(99,102,241,0.2)' },
  };
  const lc = levelConfig[level] || levelConfig['Beginner'];
  const chip = document.getElementById('levelChip');
  chip.style.background   = lc.bg;
  chip.style.border       = `1px solid ${lc.border}`;
  chip.style.color        = lc.color;
  document.getElementById('levelDot').style.background = lc.color;
  document.getElementById('levelText').textContent = level;

  // Summary pills
  const missing  = (gaps || []).filter(g => g.gap_type === 'missing');
  const weak     = (gaps || []).filter(g => g.gap_type === 'weak');
  const adequate = strong_skills || [];

  const pillsHtml = `
    ${missing.length  ? `<span class="summary-pill pill-missing">🚫 ${missing.length} Missing</span>` : ''}
    ${weak.length     ? `<span class="summary-pill pill-weak">⚠️ ${weak.length} Weak</span>` : ''}
    ${adequate.length ? `<span class="summary-pill pill-adequate">✅ ${adequate.length} Strong</span>` : ''}
  `;
  document.getElementById('summaryPills').innerHTML = pillsHtml;

  // Gauge animation
  setTimeout(() => {
    Analyzer.renderGauge(score, document.getElementById('gaugeRing'), document.getElementById('gaugeScore'));
    document.getElementById('gaugeScore').style.color = lc.color;
  }, 200);

  // Gap cards
  Analyzer.renderGaps(result, document.getElementById('gapsContainer'));

  // ── Save result ───────────────────────────────────────────────
  let savedResultId = Analyzer.loadResultId();
  if (savedResultId) {
    setSaved(savedResultId);
  }

  function setSaved(id) {
    savedResultId = id;
    Analyzer.saveResultId(id);
    ['saveBtn','saveBtnBar'].forEach(btnId => {
      const btn = document.getElementById(btnId);
      btn.textContent = '✓ Saved';
      btn.disabled = true;
      btn.style.color = 'var(--accent-light)';
      btn.style.borderColor = 'rgba(16,185,129,0.3)';
    });
    ['exportBtn','exportBtnBar'].forEach(btnId => {
      document.getElementById(btnId).disabled = false;
    });
  }

  async function doSave() {
    if (savedResultId) return;
    const btn    = document.getElementById('saveBtn');
    const barBtn = document.getElementById('saveBtnBar');
    const alert  = document.getElementById('saveAlert');
    btn.disabled = barBtn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const data = await Analyzer.saveResult(_meta.role_id, _meta.user_skills);
      setSaved(data.result_id);
      alert.className = 'alert alert-success mt-md';
      alert.innerHTML = `<span>✓</span><span>Result saved! ID: #${data.result_id}</span>`;
    } catch (err) {
      btn.disabled = barBtn.disabled = false;
      btn.textContent = '💾 Save Result';
      alert.className = 'alert alert-error mt-md';
      alert.innerHTML = `<span>⚠</span><span>${err.message}</span>`;
    }
  }

  document.getElementById('saveBtn').addEventListener('click', doSave);
  document.getElementById('saveBtnBar').addEventListener('click', doSave);

  // ── Export PDF ───────────────────────────────────────────────
  function doExport() {
    if (!savedResultId) return;
    Analyzer.exportPDF(savedResultId);
  }
  document.getElementById('exportBtn').addEventListener('click', doExport);
  document.getElementById('exportBtnBar').addEventListener('click', doExport);
</script>
</body>
</html>
