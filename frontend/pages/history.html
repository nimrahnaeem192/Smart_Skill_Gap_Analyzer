<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — SkillGapAI</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="dashboard-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">⚡</div>
      <div class="sidebar-logo-text">SkillGap<span style="color:var(--accent)">AI</span>
        <div class="sidebar-logo-sub">Career Intelligence</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Menu</div>
      <a href="dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span> Dashboard</a>
      <a href="analyzer.html"  class="sidebar-link"><span class="sidebar-link-icon">🎯</span> New Analysis</a>
      <a href="history.html"   class="sidebar-link active"><span class="sidebar-link-icon">📁</span> History</a>
      <a href="roadmap.html"   class="sidebar-link"><span class="sidebar-link-icon">🗺️</span> Roadmap</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name"  id="sidebarName">—</div>
          <div class="sidebar-user-email" id="sidebarEmail"></div>
        </div>
      </div>
      <button class="sidebar-logout" id="logoutBtn">🚪 Sign Out</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:var(--space-md)">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <span class="topbar-title">📁 Analysis History</span>
      </div>
      <div class="topbar-right">
        <a href="analyzer.html" class="btn btn-primary btn-sm">+ New Analysis</a>
      </div>
    </div>

    <div class="page-content">
      <div class="dash-card">
        <div class="dash-card-header">
          <span class="dash-card-title">📁 All Past Analyses</span>
        </div>
        <div id="historyContainer" style="padding:var(--space-lg)">
          <div style="text-align:center;padding:var(--space-2xl);color:var(--text-dim)">Loading…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  Auth.requireAuth();

  document.getElementById('sidebarName').textContent  = Auth.getUserName() || 'User';
  document.getElementById('sidebarEmail').textContent = Auth.getUserEmail() || '';
  const initials = (Auth.getUserName()||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('logoutBtn').addEventListener('click', Auth.logout);

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('visible');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  });

  const ROLE_EMOJI = { 'Software Engineer':'💻','Data Scientist':'🧠','UI/UX Designer':'🎨','Cybersecurity Analyst':'🛡️','Project Manager':'📋' };

  function scoreColor(s) { return s>=75?'#10b981':s>=40?'#f59e0b':'#dc2626'; }
  function formatDate(d) { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

  async function loadHistory() {
    const userId = Auth.getUserId();
    try {
      const res  = await Auth.authFetch(`http://localhost:3000/api/result/history/${userId}`);
      const data = await res.json();
      const container = document.getElementById('historyContainer');

      if (!data.success || !data.data.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">No analyses yet</div><div class="empty-sub">Run your first skill analysis to see history here.</div><a href="analyzer.html" class="btn btn-primary" style="margin-top:16px">Start Analysis</a></div>`;
        return;
      }

      container.innerHTML = `
        <table class="gap-table" style="width:100%">
          <thead><tr>
            <th>#</th><th>Role</th><th>Score</th><th>Level</th><th>Date</th><th></th>
          </tr></thead>
          <tbody>
            ${data.data.map((r,i) => `
              <tr class="gap-table-row">
                <td style="color:var(--text-dim);font-size:0.8rem">${i+1}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px">
                    <span>${ROLE_EMOJI[r.role_name]||'💼'}</span>
                    <div>
                      <div class="skill-name-cell">${r.role_name}</div>
                      <div style="font-size:0.72rem;color:var(--text-dim)">${r.domain}</div>
                    </div>
                  </div>
                </td>
                <td style="font-weight:700;color:${scoreColor(r.score)};font-size:1.1rem">${r.score}</td>
                <td><span class="level-badge" style="background:${r.level==='Advanced'?'#ecfdf5':r.level==='Intermediate'?'#fffbeb':'#fef2f2'};color:${scoreColor(r.score)};border:1px solid ${scoreColor(r.score)}33">${r.level}</span></td>
                <td style="color:var(--text-dim);font-size:0.8rem">${formatDate(r.analyzed_at)}</td>
                <td><a href="result.html" class="result-link">View →</a></td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch(err) {
      document.getElementById('historyContainer').innerHTML = `<div class="alert alert-error"><span>⚠</span><span>${err.message}</span></div>`;
    }
  }

  loadHistory();
</script>
</body>
</html>
